<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Notes 💖</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <header class="header">
            <h1>Love Notes</h1>
            <p class="subtitle">A dreamy page for sweet feelings</p>
        </header>

        <main class="main-content">
            <!-- Love Note Box -->
            <div class="message-box sorry-box" id="sorryBox">
                <div class="box-inner">
                    <div class="emoji-display">😍</div>
                    <h2>I LOVE YOU</h2>
                    <div class="message-popup sorry-popup hidden" id="sorryMessage">
                        <div class="popup-content">
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <p>I LOVE YOU ❤️</p>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Forever Love Box -->
            <div class="message-box miss-box" id="missBox">
                <div class="box-inner">
                    <div class="emoji-display">💞</div>
                    <h2>FOREVER YOURS</h2>
                    <div class="message-popup miss-popup hidden" id="missMessage">
                        <div class="popup-content">
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <p>FOREVER YOURS ❤️</p>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                            <span class="heart">❤️</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>💕 Siri 💕</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
